<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Demo Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 400px;">
  <h4 class="text-center mb-3">Demo Form</h4>

  <form action="/param/save/2021" method="post" class="mb-3">
    <div class="mb-3">
      <label for="y" class="form-label">Nhập giá trị Y</label>
      <input type="text" id="y" name="y" value="2031" class="form-control">
    </div>
    <button class="btn btn-primary w-100">Save</button>
  </form>

  <ul class="list-group">
    <li class="list-group-item">x: <span th:text="${x}"></span></li>
    <li class="list-group-item">Y: <span th:text="${y}"></span></li>
  </ul>
</div>

</body>
</html>
