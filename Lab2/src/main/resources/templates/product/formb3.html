<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="/product/save" method="post">
  <label>Product name:</label>
  <input name="name" type="text" required th:value="${product.name}">
    <br>
    <label>Product price: </label>
    <input name="price" th:value="${product.name}" type="number" step="0.01" required>
  <button type="submit">Save</button>
</form>

<h2>Product Details: </h2>
<ul>
  <li>Product name: <span th:text="${product.name}"></span></li>
    <li>Product price: <span th:text="${product.price}"></span></li></ul>
</body>
</html>
